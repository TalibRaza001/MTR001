class ViralShortsFinder:
    def __init__(self, openai_api_key: str = None):
        self.openai_client = openai.OpenAI(api_key=openai_api_key) if openai_api_key else None
        self.virality_model = self._load_virality_model()
        self.output_dir = Path("viral_content")
        self.output_dir.mkdir(exist_ok=True)
        
    def _load_virality_model(self):
        """Load pre-trained virality prediction model"""
        # Simple ML model based on historical viral data
        # Features: views, likes, shares, comments, watch_time, growth_rate
        weights = {
            'views': 0.2, 'likes': 0.25, 'comments': 0.2, 
            'shares': 0.25, 'engagement_rate': 0.3, 'velocity': 0.25
        }
        return weights
    
    def get_trending_tiktok(self, count: int = 50) -> List[Dict]:
        """Scrape trending TikTok videos"""
        print("🔥 Fetching trending TikTok videos...")
        trending = []
        
        # TikTok trending URL (use official trending page)
        url = "https://www.tiktok.com/trending"
        
        # Using yt-dlp for reliable extraction
        ydl_opts = {
            'quiet': True,
            'no_warnings': True,
            'extract_flat': True,
        }
        
        with yt_dlp.YoutubeDL(ydl_opts) as ydl:
            try:
                info = ydl.extract_info(url, download=False)
                videos = info.get('entries', [])[:count]
                
                for video in videos:
                    trending.append({
                        'platform': 'tiktok',
                        'url': video.get('url'),
                        'title': video.get('title', ''),
                        'author': video.get('uploader', ''),
                        'views': video.get('view_count', 0),
                        'likes': video.get('like_count', 0),
                        'comments': video.get('comment_count', 0),
                        'shares': video.get('repost_count', 0),
                        'duration': video.get('duration', 0),
                        'thumbnail': video.get('thumbnail')
                    })
            except Exception as e:
                print(f"TikTok scrape error: {e}")
        
        return trending
    
    def get_trending_youtube_shorts(self, count: int = 50) -> List[Dict]:
        """Get trending YouTube Shorts"""
        print("📱 Fetching YouTube Shorts...")
        shorts = []
        
        ydl_opts = {
            'quiet': True,
            'extract_flat': True,
        }
        
        # YouTube Shorts trending
        urls = [
            "https://www.youtube.com/results?search_query=shorts&sp=CAMSBAgFEAE%253D"
        ]
        
        with yt_dlp.YoutubeDL(ydl_opts) as ydl:
            for url in urls:
                try:
                    info = ydl.extract_info(url, download=False)
                    videos = info.get('entries', [])[:count]
                    
                    for video in videos:
                        if video.get('duration', 0) <= 60:  # Shorts only
                            shorts.append({
                                'platform': 'youtube_shorts',
                                'url': video.get('url'),
                                'title': video.get('title', ''),
                                'author': video.get('uploader', ''),
                                'views': video.get('view_count', 0),
                                'likes': video.get('like_count', 0),
                                'comments': video.get('comment_count', 0),
                                'duration': video.get('duration', 0),
                                'thumbnail': video.get('thumbnail')
                            })
                except Exception as e:
                    print(f"YouTube scrape error: {e}")
        
        return shorts
    
    def get_trending_instagram_reels(self, count: int = 30) -> List[Dict]:
        """Get trending Instagram Reels (requires login)"""
        print("📸 Fetching Instagram Reels...")
        reels = []
        
        # Note: Instagram requires authentication for full access
        # This is a simplified version using public trending
        try:
            # Use instagrapi or similar for full access
            pass
        except:
            # Fallback to public trending search
            reels = []  # Placeholder
            
        return reels
    
    def calculate_virality_score(self, video: Dict) -> float:
        """Calculate virality score (0-100)"""
        try:
            views = video.get('views', 0) or 0
            likes = video.get('likes', 0) or 0
            comments = video.get('comments', 0) or 0
            shares = video.get('shares', 0) or 0
            duration = video.get('duration', 15) or 15
            
            # Engagement rate
            engagement_rate = (likes + comments + shares) / max(views, 1) * 100
            
            # Velocity score (views per minute of content)
            velocity = views / max(duration, 1)
            
            # Normalize scores
            norm_views = min(views / 1e6, 100)  # Cap at 100M views
            norm_likes = min(likes / 1e6, 100)
            norm_comments = min(comments / 10e3, 100)
            norm_shares = min(shares / 1e3, 100)
            norm_engagement = min(engagement_rate * 10, 100)
            norm_velocity = min(velocity / 1e4, 100)
            
            # Weighted score
            score = (
                norm_views * 0.15 +
                norm_likes * 0.25 +
                norm_comments * 0.15 +
                norm_shares * 0.25 +
                norm_engagement * 0.15 +
                norm_velocity * 0.05
            )
            
            return min(score, 100)
        except:
            return 0
    
    def analyze_content_trends(self, videos: List[Dict]) -> Dict:
        """Analyze trends in viral content"""
        df = pd.DataFrame(videos)
        
        trends = {
            'top_niches': df['title'].str.lower().str.extract(
                r'(dance|comedy|food|fitness|motivation|pets|asmr|prank|tutorial|review)'
            ).stack().value_counts().head(10).to_dict(),
            'avg_duration': df['duration'].mean(),
            'avg_virality': df['virality_score'].mean(),
            'peak_hours': df.index[df['virality_score'] > df['virality_score'].quantile(0.9)].tolist()
        }
        
        return trends
    
    def generate_captions(self, video: Dict) -> List[str]:
        """AI-generated optimized captions"""
        if not self.openai_client:
            return [video.get('title', '')[:100]]
        
        try:
            prompt = f"""
            Create 3 viral captions for this {video['platform']} video:
            Title: {video['title']}
            Niche: {video.get('niche', 'general')}
            
            Requirements:
            - Max 150 characters each
            - Include 3-5 trending hashtags
            - Add emoji 🔥😂✨
            - Call to action
            - Make it engaging and shareable
            """
            
            response = self.openai_client.chat.completions.create(
                model="gpt-3.5-turbo",
                messages=[{"role": "user", "content": prompt}],
                max_tokens=300
            )
            
            captions = response.choices[0].message.content.split('\n')
            return [cap.strip() for cap in captions if cap.strip()]
        except:
            return [video.get('title', '')[:100]]
    
    def download_video(self, video: Dict, output_path: str) -> str:
        """Download high-quality video"""
        ydl_opts = {
            'format': 'best[height<=1080]',
            'outtmpl': f'{output_path}/%(title)s.%(ext)s',
            'writethumbnail': True,
        }
        
        try:
            with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                ydl.download([video['url']])
                return f"{video['title']}.mp4"
        except Exception as e:
            print(f"Download failed: {e}")
            return None
    
    def find_viral_content(self, max_videos: int = 100) -> pd.DataFrame:
        """Main function to find viral content"""
        print("🚀 Starting viral content discovery...")
        
        # Collect from all platforms
        all_videos = []
        all_videos.extend(self.get_trending_tiktok(50))
        all_videos.extend(self.get_trending_youtube_shorts(50))
        
        # Calculate virality scores
        for video in all_videos:
            video['virality_score'] = self.calculate_virality_score(video)
            video['niche'] = self._predict_niche(video['title'])
        
        # Sort by virality
        viral_videos = sorted(all_videos, key=lambda x: x['virality_score'], reverse=True)
        
        # Top viral content
        top_viral = viral_videos[:max_videos]
        
        df = pd.DataFrame(top_viral)
        df['captions'] = df.apply(self.generate_captions, axis=1)
        
        # Save results
        timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
        df.to_csv(f"viral_content_{timestamp}.csv", index=False)
        df.to_json(f"viral_content_{timestamp}.json", orient='records', indent=2)
        
        print(f"✅ Found {len(top_viral)} viral videos!")
        print(f"📊 Top video: {top_viral[0]['title'][:60]}... (Score: {top_viral[0]['virality_score']:.1f})")
        
        return df
    
    def _predict_niche(self, title: str) -> str:
        """Predict video niche from title"""
        niches = {
            'dance': ['dance', 'dancing', 'choreography'],
            'comedy': ['funny', 'lol', 'prank', 'fail'],
            'food': ['food', 'recipe', 'cooking', 'eat'],
            'fitness': ['workout', 'gym', 'fitness', 'exercise'],
            'motivation': ['motivation', 'success', 'mindset'],
            'pets': ['dog', 'cat', 'pet', 'puppy']
        }
        
        title_lower = title.lower()
        for niche, keywords in niches.items():
            if any(kw in title_lower for kw in keywords):
                return niche
        return 'general'
    
    def auto_download_top_videos(self, df: pd.DataFrame, top_n: int = 10):
        """Auto-download top viral videos"""
        print(f"⬇️ Downloading top {top_n} viral videos...")
        
        platform_dir = self.output_dir / "downloads"
        platform_dir.mkdir(exist_ok=True)
        
        top_videos = df.head(top_n).to_dict('records')
        
        for i, video in enumerate(top_videos):
            platform_folder = platform_dir / video['platform']
            platform_folder.mkdir(exist_ok=True)
            
            video_file = self.download_video(video, str(platform_folder))
            if video_file:
                print(f"✅ Downloaded: {video['title'][:50]}...")
                
                # Save metadata
                metadata = {
                    **video,
                    'download_path': str(platform_folder / video_file),
                    'captions': video['captions']
                }
                
                with open(platform_folder / f"{i+1}_metadata.json", 'w') as f:
                    json.dump(metadata, f, indent=2)

def run_automation():
    """Run complete automation pipeline"""
    finder = ViralShortsFinder(openai_api_key="your-openai-key-here")
    
    # Find viral content
    viral_df = finder.find_viral_content(max_videos=50)
    
    # Analyze trends
    trends = finder.analyze_content_trends(viral_df.to_dict('records'))
    print("\n📈 TRENDING NICHES:")
    for niche, count in trends['top_niches'].items():
        print(f"  {niche}: {count}")
    
    # Auto-download top videos
    finder.auto_download_top_videos(viral_df, top_n=10)
    
    return viral_df

# Schedule automation
def schedule_daily_scan():
    schedule.every().day.at("09:00").do(run_automation)
    schedule.every().day.at("18:00").do(run_automation)
    
    while True:
        schedule.run_pending()
        time.sleep(60)

if __name__ == "__main__":
    # Run once
    viral_content = run_automation()
    
